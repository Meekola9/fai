name: Apply lineup memo fix

on:
  push:
    branches: [feature/visual-lineup-builder]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/visual-lineup-builder
          fetch-depth: 0
      - name: Apply compiler-safe derived lineup
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/pages/Lineup.tsx')
          text = path.read_text()
          old = """  const overrides = storedLineups[scheme.id] ?? {}\n  const assignments = useMemo(\n    () => generateBestLineup(data.athletes, ratings, scheme, overrides),\n    [data.athletes, overrides, ratings, scheme],\n  )\n"""
          new = """  const overrides = useMemo(\n    () => storedLineups[scheme.id] ?? {},\n    [scheme.id, storedLineups],\n  )\n  const assignments = generateBestLineup(data.athletes, ratings, scheme, overrides)\n"""
          if old not in text:
              raise SystemExit('Expected lineup memo block was not found.')
          path.write_text(text.replace(old, new, 1))
          for filename in [
              'lineup-lint.log',
              '.github/workflows/fix-lineup-memo.yml',
              '.github/workflows/apply-lineup-memo-fix.yml',
          ]:
              Path(filename).unlink(missing_ok=True)
          PY
      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix lineup memoization for React Compiler"
          git push origin HEAD:feature/visual-lineup-builder
