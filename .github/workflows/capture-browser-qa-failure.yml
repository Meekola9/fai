name: Capture browser QA failure

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Capture both browser flows
        id: qa
        shell: bash
        run: |
          set +e
          npx playwright test --grep "fresh browser automatically loads" > /tmp/archive.txt 2>&1
          a=$?
          npx playwright test --grep "coach adds a complete testing event" > /tmp/coach.txt 2>&1
          c=$?
          if [[ $a -eq 0 && $c -eq 0 ]]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            rm -f browser-qa-failure.txt
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            {
              echo "=== Archive and exercise-list QA (exit $a) ==="
              cat /tmp/archive.txt
              echo
              echo "=== Coach Power Clean entry flow (exit $c) ==="
              cat /tmp/coach.txt
            } > browser-qa-failure.txt
          fi
      - name: Commit result and remove capture workflow
        shell: bash
        run: |
          rm .github/workflows/capture-browser-qa-failure.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if [[ "${{ steps.qa.outputs.passed }}" == "true" ]]; then
            git commit -m "Browser QA passed on recapture"
          else
            git add -f browser-qa-failure.txt
            git commit -m "Capture browser QA failure details"
          fi
          git push origin HEAD:main
