name: Deploy FAI to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Public browser credentials. When absent, FAI builds in device-only mode.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Validate
        run: |
          npm run lint
          npm test
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Report deployment result
        uses: actions/github-script@v7
        with:
          script: |
            const build = '${{ needs.build.result }}';
            const deploy = '${{ needs.deploy.result }}';
            const pageUrl = '${{ needs.deploy.outputs.page_url }}' || 'https://meekola9.github.io/football-athlete-index/';
            const ok = build === 'success' && deploy === 'success';
            const body = [
              ok ? '✅ **Production deployment succeeded**' : '❌ **Production deployment failed**',
              '',
              `- Build: \`${build}\``,
              `- Deploy: \`${deploy}\``,
              `- Commit: \`${context.sha}\``,
              `- Site: ${pageUrl}`,
              `- Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 6,
              body,
            });
