name: Rebalance receiver archetypes

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  rebalance:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply receiver archetype rules and tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one match in {path}, found {count}: {old!r}")
              file.write_text(text.replace(old, new, 1))

          archetypes = "src/lib/archetypes.ts"
          tests = "src/lib/archetypes.test.ts"

          replace_once(
              archetypes,
              "type HeightPreference = 'short' | 'average' | 'tall' | 'any'\n",
              "type HeightPreference = 'short' | 'average' | 'tall' | 'any'\n"
              "type ReceiverProfileRule =\n"
              "  | 'field-stretcher'\n"
              "  | 'chain-mover'\n"
              "  | 'big-body-boundary'\n"
              "  | 'route-technician'\n"
              "  | 'yards-after-menace'\n"
              "  | 'contested-catch-freak'\n"
              "  | 'straight-line-blur'\n"
              "  | 'gadget-weapon'\n",
          )

          replace_once(
              archetypes,
              "  developmental?: boolean\n}",
              "  developmental?: boolean\n"
              "  /** Receiver-only profile rule used to separate overlapping WR trait combinations. */\n"
              "  receiverProfile?: ReceiverProfileRule\n}",
          )

          receiver_replacements = {
              "{ id: 'wr-field-stretcher', name: 'Field Stretcher', group: 'WR', role: 'WR', description: 'A receiver testing profile led by top speed, acceleration, and vertical explosiveness.', primary: ['Speed', 'Acceleration', 'Jump'], size: 'light' },":
                "{ id: 'wr-field-stretcher', name: 'Field Stretcher', group: 'WR', role: 'WR', description: 'A receiver testing profile led by top speed, acceleration, and vertical explosiveness.', primary: ['Speed', 'Acceleration', 'Jump'], size: 'light', receiverProfile: 'field-stretcher' },",
              "{ id: 'wr-chain-mover', name: 'Chain Mover', group: 'WR', role: 'WR', description: 'A repeatable movement profile combining conditioning, change of direction, and pursuit effort; route reliability requires film.', primary: ['Conditioning', 'Change of Direction', 'Pursuit'] },":
                "{ id: 'wr-chain-mover', name: 'Chain Mover', group: 'WR', role: 'WR', description: 'A repeatable movement profile combining conditioning, change of direction, and pursuit effort; route reliability requires film.', primary: ['Conditioning', 'Change of Direction', 'Pursuit'], receiverProfile: 'chain-mover' },",
              "{ id: 'wr-big-body-boundary', name: 'Big Body Boundary', group: 'WR', role: 'WR', description: 'A larger perimeter profile led by jump, power, and strength.', primary: ['Jump', 'Power', 'Strength'], size: 'heavy', height: 'tall' },":
                "{ id: 'wr-big-body-boundary', name: 'Big Body Boundary', group: 'WR', role: 'WR', description: 'A larger perimeter profile led by power, strength, and useful jump output.', primary: ['Power', 'Strength', 'Jump'], size: 'heavy', height: 'tall', receiverProfile: 'big-body-boundary' },",
              "{ id: 'wr-route-technician', name: 'Route Technician', group: 'WR', role: 'WR', description: 'A receiver testing proxy led by change of direction, acceleration, and speed; route craft requires film confirmation.', primary: ['Change of Direction', 'Acceleration', 'Speed'] },":
                "{ id: 'wr-route-technician', name: 'Route Technician', group: 'WR', role: 'WR', description: 'A receiver testing proxy led by change of direction that clearly separates from linear speed; route craft requires film confirmation.', primary: ['Change of Direction', 'Acceleration', 'Speed'], receiverProfile: 'route-technician' },",
              "{ id: 'wr-yards-after-menace', name: 'Yards-After Menace', group: 'WR', role: 'WR', description: 'A physical movement profile combining acceleration, power, and change of direction.', primary: ['Acceleration', 'Power', 'Change of Direction'], size: 'heavy' },":
                "{ id: 'wr-yards-after-menace', name: 'Yards-After Menace', group: 'WR', role: 'WR', description: 'A physical movement profile where acceleration, power, and change of direction rise together.', primary: ['Acceleration', 'Power', 'Change of Direction'], size: 'heavy', receiverProfile: 'yards-after-menace' },",
              "{ id: 'wr-contested-catch-freak', name: 'Contested Catch Freak', group: 'WR', role: 'WR', description: 'A springy receiver profile led by jump, power, and strength; catch skill requires film.', primary: ['Jump', 'Power', 'Strength'], height: 'tall' },":
                "{ id: 'wr-contested-catch-freak', name: 'Contested Catch Freak', group: 'WR', role: 'WR', description: 'A tall springy receiver whose jump score clearly separates from the rest of the physical profile; catch skill requires film.', primary: ['Jump', 'Power', 'Strength'], height: 'tall', receiverProfile: 'contested-catch-freak' },",
              "{ id: 'wr-straight-line-blur', name: 'Straight Line Blur', group: 'WR', role: 'WR', description: 'A pure linear-speed profile led by top speed and acceleration.', primary: ['Speed', 'Acceleration', 'Power'], size: 'light' },":
                "{ id: 'wr-straight-line-blur', name: 'Straight Line Blur', group: 'WR', role: 'WR', description: 'A pure linear-speed profile where top speed clearly separates from change of direction and jump output.', primary: ['Speed', 'Acceleration', 'Power'], size: 'light', receiverProfile: 'straight-line-blur' },",
              "{ id: 'wr-gadget-weapon', name: 'Gadget Weapon', group: 'WR', role: 'WR', description: 'A versatile space-movement profile led by change of direction, speed, and acceleration.', primary: ['Change of Direction', 'Speed', 'Acceleration'], size: 'light' },":
                "{ id: 'wr-gadget-weapon', name: 'Gadget Weapon', group: 'WR', role: 'WR', description: 'A versatile space-movement profile with closely balanced change of direction, speed, and acceleration.', primary: ['Change of Direction', 'Speed', 'Acceleration'], size: 'light', receiverProfile: 'gadget-weapon' },",
          }
          for old, new in receiver_replacements.items():
              replace_once(archetypes, old, new)

          marker = "function fitScore(\n"
          receiver_logic = r'''function receiverProfileAdjustment(
  definition: ArchetypeDefinition,
  result: ComputedSession,
  available: readonly Category[],
  mean: number,
): number {
  if (definition.role !== 'WR' || !definition.receiverProfile) return 0

  const availableSet = new Set(available)
  const score = (category: Category): number =>
    availableSet.has(category) ? result.categories[category] : mean
  const has = (...categories: Category[]): boolean =>
    categories.every((category) => availableSet.has(category))

  const speed = score('Speed')
  const acceleration = score('Acceleration')
  const jump = score('Jump')
  const power = score('Power')
  const pursuit = score('Pursuit')
  const changeOfDirection = score('Change of Direction')
  const conditioning = score('Conditioning')
  const strength = score('Strength')
  const relative = (value: number): number => value - mean

  switch (definition.receiverProfile) {
    case 'field-stretcher': {
      let adjustment =
        relative(speed) * 0.30
        + relative(acceleration) * 0.20
        + relative(jump) * 0.45
      if (has('Speed', 'Change of Direction', 'Jump') && speed >= changeOfDirection + 5 && jump >= mean + 5) adjustment += 8
      if (has('Speed', 'Jump') && jump >= speed - 12) adjustment += 4
      if (has('Speed') && speed < mean) adjustment -= 5
      return adjustment
    }
    case 'straight-line-blur': {
      let adjustment =
        relative(speed) * 0.65
        + relative(acceleration) * 0.25
        - relative(changeOfDirection) * 0.25
        - relative(jump) * 0.18
      if (has('Speed', 'Change of Direction') && speed >= changeOfDirection + 12) adjustment += 8
      if (has('Speed', 'Jump') && speed >= jump + 15) adjustment += 5
      if (has('Speed', 'Jump') && jump >= speed - 10) adjustment -= 6
      return adjustment
    }
    case 'route-technician': {
      let adjustment =
        relative(changeOfDirection) * 0.55
        + relative(acceleration) * 0.30
        + relative(speed) * 0.10
      if (has('Change of Direction', 'Speed') && changeOfDirection >= speed + 6) adjustment += 6
      if (has('Change of Direction') && changeOfDirection < mean) adjustment -= 5
      return adjustment
    }
    case 'gadget-weapon': {
      let adjustment =
        relative(changeOfDirection) * 0.32
        + relative(speed) * 0.30
        + relative(acceleration) * 0.28
      if (has('Change of Direction', 'Speed', 'Acceleration')) {
        const spread = Math.max(changeOfDirection, speed, acceleration) - Math.min(changeOfDirection, speed, acceleration)
        if (spread <= 8) adjustment += 7
        else if (spread <= 12) adjustment += 3
      }
      if (has('Power', 'Change of Direction', 'Speed', 'Acceleration') && power > Math.max(changeOfDirection, speed, acceleration) + 5) adjustment -= 4
      return adjustment
    }
    case 'big-body-boundary': {
      let adjustment =
        relative(power) * 0.30
        + relative(strength) * 0.125
        + relative(jump) * 0.18
      if (sizeClass(result, 'WR') === 'heavy' && heightClass(result, 'WR') === 'tall') adjustment += 7
      if (has('Jump', 'Power') && jump >= power + 10) adjustment -= 6
      return adjustment
    }
    case 'contested-catch-freak': {
      let adjustment =
        relative(jump) * 0.65
        + relative(power) * 0.18
        + relative(strength) * 0.04
      if (has('Jump', 'Power', 'Strength') && jump >= Math.max(power, strength) + 8) adjustment += 8
      if (heightClass(result, 'WR') === 'tall') adjustment += 3
      return adjustment
    }
    case 'yards-after-menace': {
      let adjustment =
        relative(acceleration) * 0.35
        + relative(power) * 0.32
        + relative(changeOfDirection) * 0.30
      if (has('Acceleration', 'Power', 'Change of Direction') && Math.min(acceleration, power, changeOfDirection) >= mean) adjustment += 6
      if (has('Power', 'Speed') && power > speed) adjustment += 3
      return adjustment
    }
    case 'chain-mover': {
      let adjustment =
        relative(conditioning) * 0.42
        + relative(changeOfDirection) * 0.30
        + relative(pursuit) * 0.25
      if (has('Conditioning', 'Speed', 'Pursuit') && conditioning >= speed && pursuit >= mean) adjustment += 6
      if (
        has('Speed', 'Acceleration', 'Conditioning', 'Pursuit')
        && (speed + acceleration) / 2 > (conditioning + pursuit) / 2 + 10
      ) adjustment -= 5
      return adjustment
    }
  }
}

'''
          replace_once(archetypes, marker, receiver_logic + marker)

          replace_once(
              archetypes,
              "  const coverageBonus = denominator >= 1.68 ? 2 : 0\n  return weighted / denominator + specialization + sizeBonus + heightBonus + coverageBonus\n",
              "  const coverageBonus = denominator >= 1.68 ? 2 : 0\n"
              "  const profileAdjustment = receiverProfileAdjustment(definition, result, available, mean)\n"
              "  return weighted / denominator + specialization + sizeBonus + heightBonus + coverageBonus + profileAdjustment\n",
          )

          test_marker = "  it('does not let a light speed-skill athlete’s relative strength dominate the evidence', () => {\n"
          test_block = r'''  it('assigns all eight receiver archetypes to distinct testing shapes', () => {
    const profiles = [
      {
        expected: 'Field Stretcher',
        weight: 160,
        height: 70,
        scores: { Speed: 94, Acceleration: 89, Jump: 84, Power: 68, Pursuit: 65, 'Change of Direction': 72, Conditioning: 67, Strength: 55 },
      },
      {
        expected: 'Straight Line Blur',
        weight: 160,
        height: 70,
        scores: { Speed: 98, Acceleration: 90, Jump: 66, Power: 72, Pursuit: 60, 'Change of Direction': 65, Conditioning: 65, Strength: 50 },
      },
      {
        expected: 'Route Technician',
        weight: 175,
        height: 71,
        scores: { Speed: 77, Acceleration: 88, Jump: 68, Power: 65, Pursuit: 70, 'Change of Direction': 96, Conditioning: 76, Strength: 55 },
      },
      {
        expected: 'Gadget Weapon',
        weight: 160,
        height: 69,
        scores: { Speed: 89, Acceleration: 87, Jump: 68, Power: 65, Pursuit: 70, 'Change of Direction': 91, Conditioning: 74, Strength: 52 },
      },
      {
        expected: 'Big Body Boundary',
        weight: 190,
        height: 75,
        scores: { Speed: 70, Acceleration: 72, Jump: 86, Power: 88, Pursuit: 65, 'Change of Direction': 67, Conditioning: 72, Strength: 82 },
      },
      {
        expected: 'Contested Catch Freak',
        weight: 190,
        height: 75,
        scores: { Speed: 72, Acceleration: 74, Jump: 98, Power: 78, Pursuit: 65, 'Change of Direction': 68, Conditioning: 70, Strength: 68 },
      },
      {
        expected: 'Yards-After Menace',
        weight: 190,
        height: 74,
        scores: { Speed: 78, Acceleration: 92, Jump: 76, Power: 90, Pursuit: 72, 'Change of Direction': 88, Conditioning: 74, Strength: 72 },
      },
      {
        expected: 'Chain Mover',
        weight: 175,
        height: 71,
        scores: { Speed: 74, Acceleration: 78, Jump: 64, Power: 60, Pursuit: 88, 'Change of Direction': 86, Conditioning: 94, Strength: 58 },
      },
    ] as const

    const assignments = profiles.map((profile) => archetypeFor(resultFor('WR', profile.scores, {
      position: 'WR',
      weight: profile.weight,
      height: profile.height,
    }))?.name)

    expect(assignments).toEqual(profiles.map((profile) => profile.expected))
    expect(new Set(assignments).size).toBe(profiles.length)
  })

'''
          replace_once(tests, test_marker, test_block + test_marker)

          Path('.github/workflows/rebalance-receiver-archetypes.yml').unlink()
          PY

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Archive and exercise-list QA
        run: npx playwright test --grep "fresh browser automatically loads"

      - name: Coach testing-entry QA
        run: npx playwright test --grep "coach adds a complete testing event"

      - name: Commit validated receiver archetype rebalance
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Rebalance receiver archetype assignment rules"
          git push origin HEAD:main
