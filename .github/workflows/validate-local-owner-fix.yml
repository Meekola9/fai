name: Validate local owner repair

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Run complete validation and capture every stage
        id: validate
        shell: bash
        run: |
          set +e
          npm install > /tmp/install.txt 2>&1
          install_status=$?

          lint_status=99
          test_status=99
          build_status=99
          chromium_status=99
          archive_status=99
          coach_status=99

          if [[ $install_status -eq 0 ]]; then
            npm run lint > /tmp/lint.txt 2>&1
            lint_status=$?
            npm test > /tmp/test.txt 2>&1
            test_status=$?
            npm run build > /tmp/build.txt 2>&1
            build_status=$?
            npx playwright install --with-deps chromium > /tmp/chromium.txt 2>&1
            chromium_status=$?

            if [[ $chromium_status -eq 0 ]]; then
              npx playwright test --grep "fresh browser automatically loads" > /tmp/archive.txt 2>&1
              archive_status=$?
              npx playwright test --grep "coach adds a complete testing event" > /tmp/coach.txt 2>&1
              coach_status=$?
            fi
          fi

          if [[ $install_status -eq 0 && $lint_status -eq 0 && $test_status -eq 0 && $build_status -eq 0 && $chromium_status -eq 0 && $archive_status -eq 0 && $coach_status -eq 0 ]]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            rm -f browser-qa-failure.txt claude-validation-failure.txt
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            {
              echo "install=$install_status lint=$lint_status test=$test_status build=$build_status chromium=$chromium_status archive=$archive_status coach=$coach_status"
              for stage in install lint test build chromium archive coach; do
                echo
                echo "=== $stage ==="
                file="/tmp/$stage.txt"
                if [[ -f "$file" ]]; then cat "$file"; else echo "Not run"; fi
              done
            } > claude-validation-failure.txt
          fi

      - name: Publish result and remove temporary validator
        shell: bash
        run: |
          rm .github/workflows/validate-local-owner-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if [[ "${{ steps.validate.outputs.passed }}" == "true" ]]; then
            git commit -m "Validate Claude repair: all checks passed"
          else
            git add -f claude-validation-failure.txt
            git commit -m "Capture Claude repair validation failure"
          fi
          git push origin HEAD:main

      - name: Fail when validation did not pass
        if: steps.validate.outputs.passed != 'true'
        run: exit 1
