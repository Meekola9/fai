name: Validate Claude browser QA

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run repaired browser flows
        id: browser
        shell: bash
        run: |
          set +e
          npx playwright test --grep "fresh browser automatically loads" 2>&1 | tee /tmp/archive-qa.log
          archive_status=${PIPESTATUS[0]}
          npx playwright test --grep "coach adds a complete testing event" 2>&1 | tee /tmp/coach-qa.log
          coach_status=${PIPESTATUS[0]}

          if [[ $archive_status -eq 0 && $coach_status -eq 0 ]]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            rm -f browser-qa-failure.log
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            {
              echo "=== Archive and exercise-list QA ==="
              cat /tmp/archive-qa.log
              echo
              echo "=== Coach Power Clean entry flow ==="
              cat /tmp/coach-qa.log
            } > browser-qa-failure.log
          fi

      - name: Remove validator and record result
        shell: bash
        run: |
          rm .github/workflows/validate-claude-browser-qa.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if [[ "${{ steps.browser.outputs.passed }}" == "true" ]]; then
            git commit -m "Browser QA passed after Claude repair"
          else
            git commit -m "Browser QA failed after Claude repair"
          fi
          git push origin HEAD:main

      - name: Fail when browser QA failed
        if: steps.browser.outputs.passed != 'true'
        run: exit 1
