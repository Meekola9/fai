name: FAI CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Athlete identity regression
        run: npx vitest run src/lib/athleteIdentity.test.ts
      - name: Historical seed coverage
        run: npx vitest run src/data/historicalSeed.test.ts -t "loads the complete cleaned"
      - name: Historical seed aliases
        run: npx vitest run src/data/historicalSeed.test.ts -t "contains canonical full-name"
      - name: Historical seed local overlay
        run: npx vitest run src/data/historicalSeed.test.ts -t "overlays coach-entered"
      - name: Full test suite
        run: npm test
      - name: Build
        run: npm run build
