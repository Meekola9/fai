name: FAI CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Athlete identity regression
        run: npx vitest run src/lib/athleteIdentity.test.ts
      - name: Capture historical seed decoder diagnostic
        continue-on-error: true
        run: npx vitest run src/data/historicalSeedDiagnostic.test.ts
      - name: Upload historical seed diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: historical-seed-diagnostic
          path: seed-diagnostic.txt
          if-no-files-found: warn
          retention-days: 1
      - name: Historical seed decode
        run: npx vitest run src/data/historicalSeed.test.ts -t "decodes the bundled"
      - name: Historical seed years
        run: npx vitest run src/data/historicalSeed.test.ts -t "every historical year"
      - name: Historical seed event count
        run: npx vitest run src/data/historicalSeed.test.ts -t "all 18 historical"
      - name: Historical seed athlete count
        run: npx vitest run src/data/historicalSeed.test.ts -t "126 consolidated"
      - name: Historical seed session count
        run: npx vitest run src/data/historicalSeed.test.ts -t "all 562 historical"
      - name: Historical seed aliases
        run: npx vitest run src/data/historicalSeed.test.ts -t "canonical full-name"
      - name: Historical seed local overlay
        run: npx vitest run src/data/historicalSeed.test.ts -t "overlays coach-entered"
      - name: Full test suite
        run: npm test
      - name: Build
        run: npm run build
