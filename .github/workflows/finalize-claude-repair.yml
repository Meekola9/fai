name: Finalize Claude repair

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Run final validation
        id: final
        shell: bash
        run: |
          set +e
          npm install > /tmp/install.txt 2>&1; install=$?
          npm run lint > /tmp/lint.txt 2>&1; lint=$?
          npm test > /tmp/test.txt 2>&1; test=$?
          npm run build > /tmp/build.txt 2>&1; build=$?
          npx playwright install --with-deps chromium > /tmp/chromium.txt 2>&1; chromium=$?
          npx playwright test --grep "fresh browser automatically loads" > /tmp/archive.txt 2>&1; archive=$?
          npx playwright test --grep "coach adds a complete testing event" > /tmp/coach.txt 2>&1; coach=$?

          if [[ $install -eq 0 && $lint -eq 0 && $test -eq 0 && $build -eq 0 && $chromium -eq 0 && $archive -eq 0 && $coach -eq 0 ]]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            rm -f browser-qa-failure.txt claude-validation-failure.txt
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            {
              echo "install=$install lint=$lint test=$test build=$build chromium=$chromium archive=$archive coach=$coach"
              for stage in install lint test build chromium archive coach; do
                echo
                echo "=== $stage ==="
                cat "/tmp/$stage.txt"
              done
            } > claude-validation-failure.txt
          fi
      - name: Publish final result and remove validator
        shell: bash
        run: |
          rm .github/workflows/finalize-claude-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if [[ "${{ steps.final.outputs.passed }}" == "true" ]]; then
            git commit -m "Finish Claude work: all validation passed"
          else
            git add -f claude-validation-failure.txt
            git commit -m "Claude work still has validation failures"
          fi
          git push origin HEAD:main
      - name: Fail if final validation failed
        if: steps.final.outputs.passed != 'true'
        run: exit 1
