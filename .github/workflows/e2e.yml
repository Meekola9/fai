name: FAI Browser QA

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  combine-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run archive and exercise-list QA
        run: npx playwright test --grep "fresh browser automatically loads"
      - name: Run coach Power Clean entry flow
        run: npx playwright test --grep "coach adds a complete testing event"
      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-evidence
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
