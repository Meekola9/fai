name: FAI Browser QA

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  combine-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run three-day combine QA
        run: |
          set -o pipefail
          npm run test:e2e 2>&1 | tee e2e.log
      - name: Upload browser log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-error-log
          path: e2e.log
          retention-days: 14
      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-evidence
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
