name: FAI Browser QA

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  combine-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run archive and exercise-list QA
        run: npx playwright test --grep "fresh browser automatically loads"
      - name: Run coach Power Clean entry flow
        run: |
          set -o pipefail
          npx playwright test --grep "coach adds a complete testing event" 2>&1 | tee coach-flow.log
      - name: Comment coach-flow failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo '### Temporary browser QA diagnostic'
            echo '```text'
            tail -80 coach-flow.log
            echo '```'
          } > coach-flow-comment.md
          gh pr comment "$PR_NUMBER" --body-file coach-flow-comment.md
      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-evidence
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
