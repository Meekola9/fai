name: FAI Browser QA

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  combine-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify historical counts and years
        run: npx playwright test -g "fresh browser seed has exact historical counts"
      - name: Upload historical seed summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-seed-summary
          path: browser-seed-summary.json
          if-no-files-found: ignore
          retention-days: 2
      - name: Verify athlete alias consolidation
        run: npx playwright test -g "fresh browser seed consolidates known aliases"
      - name: Verify weekday-free exercise screen
        run: npx playwright test -g "fresh browser shows one weekday-free exercise list"
      - name: Verify coach entry, persistence, profiles, leaderboards, and export
        run: npx playwright test -g "coach adds a complete testing event"
      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-evidence
          path: |
            browser-startup-diagnostic.json
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
