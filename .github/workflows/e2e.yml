name: FAI Browser QA

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  combine-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Capture fresh-browser seed state
        run: npx playwright test e2e/seed-diagnostic.spec.ts
      - name: Report unexpected seed state on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'browser-seed-diagnostic.json';
            if (!fs.existsSync(path)) return;
            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            const state = report.state || {};
            const unexpected = state.athletes !== 126 || state.events !== 18 || state.sessions !== 562 || (report.errors || []).length > 0;
            if (!unexpected) return;
            const marker = '<!-- fai-browser-seed-diagnostic -->';
            const body = `${marker}\n### Browser seed diagnostic\n\n\`\`\`json\n${JSON.stringify(report, null, 2)}\n\`\`\``;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const prior = comments.find(comment => comment.body && comment.body.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
      - name: Verify 126 historical athletes
        run: npx playwright test -g "fresh browser has 126 historical athletes"
      - name: Verify 18 historical events
        run: npx playwright test -g "fresh browser has 18 historical events"
      - name: Verify 562 historical sessions
        run: npx playwright test -g "fresh browser has 562 historical sessions"
      - name: Verify 2020 through 2025 coverage
        run: npx playwright test -g "fresh browser covers historical years"
      - name: Verify athlete alias consolidation
        run: npx playwright test -g "fresh browser seed consolidates known aliases"
      - name: Verify weekday-free exercise screen
        run: npx playwright test -g "fresh browser shows one weekday-free exercise list"
      - name: Verify coach entry, persistence, profiles, leaderboards, and export
        run: npx playwright test -g "coach adds a complete testing event"
      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-evidence
          path: |
            browser-seed-diagnostic.json
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
